services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: personal_ai_backend
    working_dir: /app
    command: ["sh", "-c", "uvicorn app.main:app --host 0.0.0.0 --port ${API_PORT:-8000} --no-access-log"]
    environment:
      API_PORT: ${API_PORT:-8000}
      APP_ENV: ${APP_ENV:-dev}
      APP_VERSION: ${APP_VERSION:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_CORS_ALLOW_ORIGINS: ${APP_CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      AI_TOKEN_BUDGET_FREE: ${AI_TOKEN_BUDGET_FREE:-200000}
      AI_TOKEN_BUDGET_PREMIUM: ${AI_TOKEN_BUDGET_PREMIUM:-2000000}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      APP_DEV_JWT_SECRET: ${APP_DEV_JWT_SECRET:-dev_jwt_secret}
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ./backend:/app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:${API_PORT:-8000}/health/live', timeout=2)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: personal_ai_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_ai}
      POSTGRES_USER: ${POSTGRES_USER:-personal_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-personal_ai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-personal_ai} -d ${POSTGRES_DB:-personal_ai}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
