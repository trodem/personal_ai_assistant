name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend and quality dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install ruff==0.6.8 mypy==1.11.2

      - name: Run quality checks
        shell: pwsh
        run: ./scripts/quality-check.ps1

      - name: Cleanup containers
        if: always()
        shell: pwsh
        run: docker compose down -v
